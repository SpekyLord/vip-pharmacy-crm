        - generic [ref=e991]: "💡 Phase 32R — GRN is the capture surface. All batch/lot + expiry + qty data is entered here, and the paper Undertaking becomes the OCR source that auto-fills lines in bulk. The Undertaking page downstream is a read-only approval wrapper, not another data-entry form. Every GRN auto-assigns a human-readable number on create — `GRN-{TERR|ENTITY}{MMDDYY}-{NNN}` (e.g. `GRN-ILO042026-001`, matching the CALF/PO/JE format) — sequenced atomically per territory-per-day. Subscribers in non-pharmacy verticals can relax batch/expiry requirements in Control Center → GRN Settings — FIFO stays intact because blanks become safe sentinels (batch=\"N/A\", expiry=9999-12-31). Proxy entry eligibility (Phase G4.5b) is two-layer: role ∈ PROXY_ENTRY_ROLES.GRN (lookup, default admin/finance/president) AND inventory.grn_proxy_entry ticked on Access Template. A \"Proxied\" pill shows on the GRN list next to the GRN #; the auto-created Undertaking inherits the same ownership so the acknowledgment cascade reaches the target BDM, not the proxy. **Phase G7.A.0 (May 2026)** — Product dropdown is scoped to your working entity. If a product looks missing it usually means the entity does not carry it: ask admin to add it via Master Data → Products (today) or, after Phase G7.A.4 ships, via the new Carry-List Manager (`/erp/carry-list`). The validator at submit only accepts products that the entity is authorized to transact — same SKU under another entity's row is rejected by design (Rule #21 — silent cross-entity references break FIFO + batch trace)."
        - generic [ref=e992]: ⚠ If an approver rejects this document, a red banner with the reason will appear on this page. Click Fix & Resubmit to edit and re-send for approval — your data is preserved.
