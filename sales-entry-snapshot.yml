            - generic [ref=e999]: "CSI only: the CSI # input shows your available booklet numbers (if you have an allocation). This is a monitoring hint — you can still type any number, but posting an unknown number will raise a yellow audit warning."
          - generic [ref=e1000]:
            - generic [ref=e1001]: "5"
            - generic [ref=e1002]: "CSI only (optional data-entry assist): use \"Scan CSI\" to OCR a blank/unsigned CSI — it auto-fills doc_ref/date/hospital/line items and stores the scan as an optional audit crumb. Photo is not required here — the signed received-CSI is a separate post-delivery artifact (see next step)."
          - generic [ref=e1003]:
            - generic [ref=e1004]: "6"
            - generic [ref=e1005]: "After delivery: go to Sales Transactions (list) and use the 📷 Attach CSI button on the POSTED row to upload the signed pink/yellow/duplicate copy returned by the hospital. This is the dunning-grade proof Finance uses for AR follow-up — it does not change posting status. The list column 📷 flips from ⚠️ to ✓ once attached."
          - generic [ref=e1006]:
