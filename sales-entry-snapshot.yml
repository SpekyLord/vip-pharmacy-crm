        - generic [ref=e1034]: "💡 CSI sales always create AR (collect via Collections). Cash Receipt and Service Invoice with CASH payment can route directly to a Petty Cash Fund — bypassing AR and auto-creating a deposit on posting. Only ACTIVE funds with REVOLVING or DEPOSIT_ONLY mode are available. Re-opening a CSI that a Collection already settled is blocked to keep AR and GL balanced — reopen the Collection first. Proxy entry (Phase G4.5a + G4.5ff May 2026): if the \"Record on behalf of\" dropdown shows at the top of the form, picking a BDM files the CSI under their bdm_id; every proxied submit is forced through Approval Hub regardless of your role (owner approval required, four-eyes guard). Eligibility is two-layer + lookup-driven (Rule #3): role ∈ PROXY_ENTRY_ROLES.SALES (default admin/finance/president — extend to `staff` to let one BDM cover another) AND sales.proxy_entry ticked on Access Template. The dropdown sources its candidates from /erp/proxy-roster/SALES — a narrow endpoint scoped to your working entity that respects VALID_OWNER_ROLES.SALES (default `staff`). Cross-entity proxy is blocked at the write layer (Rule #21). **Phase P1.2 Slice 7-extension (May 2026)** — the \"From BDM Captures\" button next to \"Scan CSI\" pulls a BDM-captured SALES or UNCATEGORIZED photo into the **entry-time OCR scan flow** (blank/unsigned CSI photo → auto-fills doc_ref/date/hospital/line items). This is the entry-time path only. The **signed pink/yellow/duplicate CSI** returned by the hospital after delivery is a separate artifact — it uploads via the **per-row 📷 Attach CSI** button on **Sales Transactions** (list) AFTER the row is POSTED, not here. **Phase P1.2 Slice 7-extension Round 2A (May 2026) shipped** — the **Sales Transactions** list now mounts a per-row \"From Captures\" picker right next to the **📷 Attach CSI** button. The picker is narrowed to the row's own bdm_id (the BDM who owns that sale), so the proxy only sees that BDM's pending SALES + UNCATEGORIZED captures. maxSelect=1 (each sale row owns exactly one received-CSI slot). The picked File flows through the same photo-only upload pipeline as gallery — the only difference is no re-upload from gallery. Picker visibility is unconditional (any user who can reach this page can see it); server-side getProxyQueue still gates by lookup-driven `CAPTURE_LIFECYCLE_ROLES.PROXY_PULL_CAPTURE` so a non-eligible click 403s cleanly. Pick the BDM in \"Record on behalf of\" first to narrow the picker to that BDM's captures. **Phase P1.2 Slice 7-extension Round 2B (May 2026) shipped** — closed the CORS lurking-bug from Round 1's file-handoff: the in-browser fetch(signedS3Url) was silently blocked because the private S3 bucket has no CORS allowlist for non-S3 origins. The \"From BDM Captures\" button (entry-time scan) here on Sales Entry, /erp/collections/session, and /erp/grn now sends only the CaptureSubmission `_id` to the backend; the server downloads the photo S3-side via AWS SDK creds (no browser fetch) and runs the same OCR pipeline. Same `CAPTURE_LIFECYCLE_ROLES.PROXY_PULL_CAPTURE` gate from Slice 1 — non-owners need PROXY_PULL_CAPTURE; admin/finance/president bypass."
