            - generic [ref=e1008]: "For Cash Receipt or Service Invoice with CASH payment: optionally select a Petty Cash Fund to deposit cash directly"
          - generic [ref=e1009]:
            - generic [ref=e1010]: "8"
            - generic [ref=e1011]: "Duplicate rule (CSI): same CSI # cannot be reused for the same hospital/customer within the live Sales bucket. CSI numbers are canonicalized on save — prefixes (\"CSI \", \"INV \", \"#\") and leading zeros are stripped, so \"4852\", \"004852\", \"CSI 004852\", and \"INV 004852\" are the same booklet page. Opening AR is a separate bucket, so historical numbers do not collide with live ones. (CASH_RECEIPT and SERVICE_INVOICE doc-refs are system-generated and kept in their exact format.) If a duplicate is flagged, edit the existing row rather than creating a new one."
          - generic [ref=e1012]:
            - generic [ref=e1013]: "9"
            - generic [ref=e1014]: Save Drafts to persist rows. Validation + posting happen **per row, one CSI at a time** — either from the per-row Validate/Post buttons inside this entry grid, or (canonically) from the Sales Transactions list. There is no bulk Validate or bulk Submit — each CSI carries its own FIFO stock snapshot and VAT balance, so batching could mask a single ERROR in a green "all posted" toast.
          - generic [ref=e1015]:
            - generic [ref=e1016]: "10"
            - generic [ref=e1017]: Red validation = must fix before posting. Yellow = informational (e.g. CSI number outside your allocation) — will NOT block posting.
