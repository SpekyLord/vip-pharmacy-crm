            - generic [ref=e1020]: "Post routes through the Approval Hub for users not in MODULE_DEFAULT_ROLES.SALES (lookup-driven, per-entity — default: admin, finance, president). Contractors/BDMs get a \"Pending approval\" toast and the row stays VALID until an authority posts it from /erp/approvals. If Authority Matrix is enabled, amount-threshold rules can add further escalation on top."
          - generic [ref=e1021]:
            - generic [ref=e1022]: "12"
            - generic [ref=e1023]: Re-open a POSTED sale from **Sales Transactions** (per-row) to correct it — reverses stock, petty-cash deposit, and journal entries (SAP Storno). The consumed CSI number returns to your available pool. Blocked if a POSTED Collection already settled this CSI; reopen the collection first to release it.
          - generic [ref=e1024]:
            - generic [ref=e1025]: "13"
            - generic [ref=e1026]: "Draft CSI overlay (Phase 15.3): any CSI-type row with at least one line item shows a \"📄 Draft CSI\" action in Sales Transactions. Clicking downloads a mm-precise PDF that overlays customer/date/items/totals onto a pre-printed BIR booklet page. Feed your booklet into the printer; do NOT print the draft onto blank paper as a standalone receipt (it is not BIR-valid). Calibrate once per printer on the My CSI page. Phase R2 — when any line carries a discount, the Less: Discount totals row (and the Total Sales VAT-Inclusive gross-before-discount row) auto-render in the booklet totals block; per-line Amount stays at qty × unit_price so the booklet math reconciles to the eye."
