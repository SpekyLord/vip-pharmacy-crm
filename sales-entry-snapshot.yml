            - generic [ref=e996]: "CSI/Cash Receipt: add one or more line items per CSI — each line has its own product (warehouse-stock filtered), batch/lot (auto-picked by FIFO), quantity, unit price, and an optional Discount % (Phase R2 — BIR-standard trade discount on the face of the invoice; reduces VAT base per RR 16-2005). Use + Line Item to add another product under the same CSI; the row shows a running Total that sums every line after discount. Service Invoice: enter description + total (no line items)."
          - generic [ref=e997]:
