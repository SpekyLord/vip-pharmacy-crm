            - generic [ref=e1011]: Save as DRAFT, then use the **per-row Validate + Submit buttons** in the working expenses table to move each entry through DRAFT → VALID → POSTED. There is no bulk Validate or bulk Submit — each entry has its own COA validation and OR gate; per-row flow prevents a single bad entry from blocking the rest.
          - generic [ref=e1012]:
            - generic [ref=e1013]: "9"
            - generic [ref=e1014]: "**ACCESS expenses (company-funded) post via the linked CALF** (Phase G4.5h one-ack cascade, matches the GRN→UT gold standard). After save, the system auto-creates a DRAFT CALF covering the ACCESS lines — go to **PRF/CALF** and submit THAT doc. The CALF acknowledge posts both the CALF AND this Expense in one MongoDB transaction. If the cascade fails re-validation, the whole acknowledge rolls back (no half-posted state). ORE-only expenses still post directly via Submit on the expense row."
