        - generic [ref=e1021]: "💡 Expenses with COA 6900 (Misc) are BLOCKED from posting — map to correct account first. ACCESS expenses with non-cash payment auto-create a CALF — SUBMIT THE CALF (not the expense) to trigger the one-acknowledge cascade that posts both docs. COA codes are configurable in Settings → COA Mapping. OCR scanning is optional — if it fails or is disabled, the photo still uploads as proof and you fill the form manually. President Delete — for the President (or anyone granted accounting.reverse_posted in Access Templates): one-click delete of bad expense rows. POSTED/DELETION_REQUESTED → SAP Storno (reverses expense + CALF-link clear + journal entries; original kept for audit). DRAFT/VALID/ERROR → hard delete. Blocked if a POSTED CALF still references the row; reverse the CALF first. All actions logged. Proxy Entry (Phase G4.5c.1) — admin/finance (or back-office contractor with expenses.proxy_entry sub-perm ticked) can key an expense on behalf of another BDM; pick the owner in the \"Record on behalf of\" dropdown. Rows keyed on behalf route through the Approval Hub on submit (Rule #20 four-eyes). CALF requirement is still enforced for proxy-keyed expenses — only the President can bypass CALF, via the batch-upload path. **Phase P1.2 Slice 1 (May 06 2026) — From BDM Captures picker** in the Batch OR Upload section pulls EXPENSE / FUEL_ENTRY / UNCATEGORIZED photos already snapped by the BDM via Capture Hub. One click attaches the S3-stored images into the existing batch OCR pipeline — same downstream code path as gallery upload, no schema change. Picker filters to the selected `Assign To` BDM when set; cross-BDM otherwise. Gated by the lookup-driven `PROXY_PULL_CAPTURE` sub-perm (CAPTURE_LIFECYCLE_ROLES). Subscribers loosen to specific staff users by editing the lookup row in Control Center → Lookup Tables, no code deploy."
        - generic [ref=e1022]: ⚠ If an approver rejects this document, a red banner with the reason will appear on this page. Click Fix & Resubmit to edit and re-send for approval — your data is preserved.
